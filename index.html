━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
【도서 이해 · 환각 금지】
- "제가 잘 모르는 책입니다"라는 식의 회피는 금지입니다. 그러나 존재하지 않는 책·인용·자료를 꾸며내는 환각은 더욱 엄격히 금지입니다.
- 토론 전, 프롬프트에 제공된 상세 정보(줄거리·리뷰·서지자료 등)를 먼저 숙지하고, 부족한 부분은 반드시 내장 웹 검색 기능으로 파악한 뒤 답변하세요.
- 인용을 할 때는 반드시 원문에서 확인된 문장만 따옴표로 묶으세요. 기억이 불확실하면 "정확한 문장은 확인이 필요하지만, 대략 ~한 내용이었다"고 표시하세요.

【독서모임의 기본 태도 — 환대 · 경청 · 존중】
- 모든 참여자는 "오늘 이 자리에 와 주신 것 자체가 의미"라는 환대의 공기를 유지합니다.
- 독자가 꺼낸 말은 먼저 **한 줄로 짧게 받아쓴 뒤**(예: "그 장면에서 외로움이 먼저 다가오셨다는 거죠") 본인의 의견을 이어 가세요.
- 판단·평가·훈수보다 **호기심의 언어**를 우선하세요. 틀린 독해란 없고, 다른 독해가 있을 뿐입니다.
- 독자의 침묵도 존중합니다. 답하기 어려워 보이면 질문을 바꾸거나, 다른 페르소나에게 넘기세요.

【토론 진행 방식】
- 책의 줄거리·인물·장면·주제를 적극 활용해 분석하고 토론하세요.
- 독자가 책의 특정 내용을 언급하면 그 지점에 곧바로 머물러 함께 들여다보세요.
- 질문만 던지고 빠지지 마세요. 항상 **"나는 이렇게 읽었다"를 먼저** 밝히고 질문으로 넘기세요.
- 동의든 반박이든 반드시 책 속 근거 또는 검증된 배경 지식을 대세요.
- 한 라운드에서는 **하나의 논점만** 깊이 파고듭니다. 논점이 바뀔 때는 "[Blueprint 3: 토론 나침반]"으로 방향을 독자에게 먼저 제안하세요.

【독자의 삶과 책을 잇기】
- 어느 라운드에서든 최소 한 번은 "이 장면이 당신의 어떤 기억/경험과 닿나요?"처럼, 책을 독자의 삶 쪽으로 끌어오는 질문을 잊지 마세요.
- 그러나 사적 경험의 강요는 금물입니다. 답하고 싶은 만큼만 열 수 있도록 여지를 두세요.

        function generatePrompt(book, author, description, level, selPersonas, specSel) {
          const lv = LEVELS.find((l) => l.id === level);
          const sel = ALL_PERSONAS.filter((p) => selPersonas.includes(p.id));

                        <button key={lv.id} onClick={() => setLevel(lv.id)} style={{
                          flex: 1, padding: "14px 10px", cursor: "pointer", textAlign: "left",
                          background: level === lv.id ? "#EDE9E0" : "#111",
                          color: level === lv.id ? "#0C0C0C" : "#555",
                          border: `1px solid ${level === lv.id ? "#EDE9E0" : "#1E1E1E"}`,
                          borderRadius: "6px", transition: "all 0.15s",
                        }}>
                          <div style={{ fontWeight: "700", fontSize: "13px", marginBottom: "2px" }}>{lv.label}</div>
                          <div style={{ fontSize: "11px" }}>{lv.desc}</div>
                        </button>
                      ))}
                    </div>
                    {step === 2 && <Next onClick={() => setStep(3)} />}
                  </Sec>
                )}

                {step >= 3 && (
                  <Sec num={3} title="오늘의 동행자를 초대합니다" show>
                    <div style={{ fontSize: "11px", color: "#555", marginBottom: "14px", fontFamily: THEME.mono }}>
                      복수 선택 가능 — 두 명 이상이면 자동으로 라운드테이블이 열립니다
                    </div>

                    <div style={{ fontSize: "11px", color: THEME.textDim, marginBottom: "9px", fontFamily: THEME.mono, letterSpacing: "1px" }}>— 토론 스타일의 벗</div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px", marginBottom: "20px" }}>
                      {BASE_PERSONAS.map((p) => <PCard key={p.id} p={p} on={selPersonas.includes(p.id)} toggle={togglePersona} />)}
                    </div>

                    <div style={{ fontSize: "11px", color: THEME.textDim, marginBottom: "9px", fontFamily: THEME.mono, letterSpacing: "1px" }}>— 전공의 렌즈를 든 벗</div>
                    <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
                      {ACADEMIC_PERSONAS.map((p) => {
                        const on = selPersonas.includes(p.id);
                        return (
                          <div key={p.id}>
                            <PCard p={p} on={on} toggle={togglePersona} wide />
                            {on && (
                              <div style={{ marginTop: "6px", padding: "14px 16px", background: "#0F0F0F", border: `1px solid ${p.border}`, borderRadius: "6px" }}>
                                <div style={{ fontSize: "11px", color: "#555", marginBottom: "10px", fontFamily: "monospace" }}>
                                  {p.specLabel} <span style={{ color: "#383838" }}>(선택 안 해도 됨, 복수 선택 가능)</span>
                                </div>
                                <div style={{ display: "flex", flexWrap: "wrap", gap: "6px" }}>
                                  {p.specs.map((s) => {
                                    const son = (specSel[p.id] || []).includes(s.id);
                                    return (
                                      <button key={s.id} onClick={() => toggleSpec(p.id, s.id)} style={{
                                        padding: "6px 11px", cursor: "pointer", textAlign: "left",
                                        background: son ? p.bg : "transparent",
                                        border: `1px solid ${son ? p.border : "#222"}`,
                                        borderRadius: "4px", transition: "all 0.12s",
                                      }}>
                                        <div style={{ fontSize: "12px", fontWeight: son ? "700" : "400", color: son ? p.color : "#666" }}>{s.label}</div>
                                        <div style={{ fontSize: "10px", color: son ? p.color : "#383838", marginTop: "2px", maxWidth: "170px", lineHeight: "1.4", opacity: 0.8 }}>{s.desc}</div>
                                      </button>
                                    );
                                  })}
                                </div>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>

                    {selPersonas.length > 0 && (
                      <div style={{ marginTop: "14px", padding: "11px 14px", background: THEME.bgSoft, border: `1px solid ${THEME.lineSoft}`, borderRadius: THEME.radius, fontSize: "12px" }}>
                        <span style={{ color: THEME.textFaint, marginRight: "8px", fontFamily: THEME.mono }}>오늘의 자리에 모인 벗</span>
                        {selPersonas.map((id) => {
                          const p = ALL_PERSONAS.find((x) => x.id === id);
                          const specs = specSel[id];
                          return (
                            <span key={id} style={{ marginRight: "12px" }}>
                              <span style={{ color: p.color }}>{p.emoji} {p.name}</span>
                              {specs?.length > 0 && (
                                <span style={{ color: "#3A3A3A", fontSize: "10px", fontFamily: "monospace" }}>
                                  {" "}({specs.map((sid) => p.specs?.find((s) => s.id === sid)?.label).filter(Boolean).join(", ")})
                                </span>
                              )}
                            </span>
                          );
                        })}
                        {selPersonas.length >= 2 && (
                          <span style={{ color: THEME.textFaint, fontSize: "11px", fontFamily: THEME.mono, display: "block", marginTop: "4px" }}>
                            → 라운드테이블 {selPersonas.length}인 — 브릿지 규칙 자동 적용
                          </span>
                        )}
                      </div>
                    )}
                  </Sec>
                )}

                {step >= 3 && (
                  <div style={{
                    margin: "4px 0 26px", padding: "13px 16px",
                    background: "rgba(42,157,143,0.03)", border: "1px solid rgba(42,157,143,0.12)",
                    borderRadius: THEME.radius, fontSize: "12px", color: "#2A6A5A", lineHeight: "1.9",
                  }}>
                    <div style={{ color: THEME.accent, fontWeight: "700", marginBottom: "4px" }}>🕯️ V2 — Round Table이 담은 것</div>
                    <div style={{ color: "#3A7A6A" }}>
                      1. <b>심층 도서 학습</b> — 도서소개·서지·보도자료·리뷰를 프롬프트에 함께 얹고, 모자란 곳은 검색으로 메우도록 지시합니다.<br />
                      2. <b>독서모임 5단계 플로우</b> — 오프닝(환대) → 첫 인상 → 심층 라운드 → 삶과의 연결 → 마음에 남긴 한 줄.<br />
                      3. <b>브릿지 규칙</b> — 라운드테이블에서 다음 발언자는 앞 사람의 말을 한 줄 받아쓴 뒤 자기 의견을 이어 갑니다.<br />
                      4. <b>환각 금지</b> — 없는 인용·에피소드 날조를 엄격히 금지합니다.
                    </div>
                  </div>
                )}

                {ready && (
                  <div style={{ background: "#0A0A0A", border: "1px solid #1C1C1C", borderRadius: "10px", overflow: "hidden" }}>
                    <div style={{
                      padding: "13px 18px", borderBottom: "1px solid #161616",
                      display: "flex", justifyContent: "space-between", alignItems: "center",
                    }}>
                      <div style={{ display: "flex", alignItems: "center", gap: "9px", flexWrap: "wrap" }}>
                        <span style={{ fontSize: "11px", color: "#555", fontFamily: THEME.mono, letterSpacing: "1px" }}>오늘의 라운드테이블 프롬프트 (Gemini 전용 · V2)</span>
                        {selPersonas.length > 1 && (
                          <span style={{ fontSize: "10px", background: "rgba(42,157,143,0.07)", color: THEME.accent, padding: "2px 7px", borderRadius: "3px", fontFamily: THEME.mono }}>
                            👥 {selPersonas.length}인 라운드테이블
                          </span>
                        )}
                      </div>
                      <button onClick={copy} style={{
                        padding: "7px 17px", background: copied ? "#2A9D8F" : "#EDE9E0",
                        color: copied ? "#fff" : "#0C0C0C", border: "none", borderRadius: "4px",
                        cursor: "pointer", fontSize: "12px", fontWeight: "700", transition: "all 0.2s",
                      }}>
                        {copied ? "✓ 복사됨" : "복사하기"}
                      </button>
                    </div>
                    <pre style={{
                      padding: "20px", fontSize: "11.5px", lineHeight: "1.85", color: "#aaa",
                      whiteSpace: "pre-wrap", wordBreak: "break-word",
                      margin: 0, maxHeight: "420px", overflowY: "auto",
                    }}>
                      {prompt}
                    </pre>
                    <div style={{ padding: "11px 18px", borderTop: "1px solid #141414", fontSize: "12px", color: "#777", lineHeight: 1.7 }}>
                      → 복사 후 <b style={{ color: THEME.accent }}>Gemini</b> 채팅창에 붙여넣으세요. 첫 답변에서 <b>[Blueprint 0: 오프닝]</b>으로 자리가 열리는지, 마지막에 <b>[Blueprint 4: 마음에 남긴 한 줄]</b>로 매듭지어지는지 확인해 보세요.
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        }

        function PCard({ p, on, toggle, wide }) {
          return (
            <button onClick={() => toggle(p.id)} style={{
              padding: "15px 14px", cursor: "pointer", textAlign: "left",
              background: on ? p.bg : "#0F0F0F",
              border: `1px solid ${on ? p.border : "#1A1A1A"}`,
              borderRadius: "7px", transition: "all 0.14s", position: "relative",
              width: wide ? "100%" : undefined,
              display: wide ? "flex" : "block",
              alignItems: wide ? "center" : undefined,
              gap: wide ? "14px" : undefined,
            }}>
              {on && (
                <div style={{
                  position: "absolute", top: "9px", right: "10px",
                  width: "16px", height: "16px", borderRadius: "50%",
                  background: p.color, display: "flex", alignItems: "center",
                  justifyContent: "center", fontSize: "9px", fontWeight: "900", color: "#000",
                }}>✓</div>
              )}
              <div style={{ fontSize: wide ? "20px" : "18px", marginBottom: wide ? 0 : "6px", flexShrink: 0 }}>{p.emoji}</div>
              <div>
                <div style={{ display: "flex", alignItems: "baseline", gap: "6px", marginBottom: "2px" }}>
                  <span style={{ fontWeight: "700", fontSize: "13px", color: on ? p.color : "#BBB" }}>{p.name}</span>
                  <span style={{ fontSize: "10px", color: "#555", fontFamily: "monospace" }}>{p.role}</span>
                </div>
                <div style={{ fontSize: "11px", color: "#666" }}>"{p.tagline}"</div>
              </div>
            </button>
          );
        }

        function Sec({ num, title, show, children }) {
          if (!show) return null;
          return (
            <div style={{ marginBottom: "36px" }}>
              <div style={{ display: "flex", alignItems: "center", gap: "11px", marginBottom: "16px" }}>
                <span style={{
                  width: "22px", height: "22px", background: "#141414", border: "1px solid #252525",
                  borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: "10px", color: "#888", fontFamily: "monospace", flexShrink: 0,
                }}>{num}</span>
                <span style={{ fontSize: "16px", fontWeight: "700", letterSpacing: "-0.3px" }}>{title}</span>
              </div>
              {children}
            </div>
          );
        }

        function Next({ onClick }) {
          return (
            <button onClick={onClick} style={{
              marginTop: "12px", padding: "9px 20px", background: "transparent",
              border: "1px solid #333", borderRadius: "4px", color: "#aaa",
              cursor: "pointer", fontSize: "13px", fontWeight: "600",
            }}>다음 단계로 →</button>
          );
        }

        function iStyle(color) {
          return {
            background: "#111", border: "1px solid #222",
            borderRadius: "6px", padding: "13px 15px", fontSize: "15px",
            color, outline: "none", boxSizing: "border-box", transition: "border 0.2s"
          };
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
