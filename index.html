    <style>
        :root {
            --ink:         #0C0C0C;
            --ink-2:       #111111;
            --ink-soft:    #161513;
            --paper:       #EDE9E0;
            --paper-dim:   #8B867D;
            --line:        #1E1A16;
            --line-soft:   #16140F;
            --candle:      #D4A373;  /* 촛불 앰버 — 에디토리얼 포인트 */
            --candle-ink:  #8A6B42;
            --rouge:       #C65D5D;  /* 책갈피 */
            --font-sans:   Pretendard, -apple-system, BlinkMacSystemFont, system-ui, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            --font-serif:  'Noto Serif KR', 'Source Serif Pro', 'Apple SD Gothic Neo', ui-serif, serif;
            --font-mono:   'JetBrains Mono', 'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, monospace;
        }
        html, body { margin: 0; padding: 0; }
        body {
            background-color: var(--ink);
            color: var(--paper);
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        * { box-sizing: border-box; }

        ::selection { background: var(--candle); color: var(--ink); }

        /* 에디토리얼 스크롤바 — 가늘고 조용하게 */
        pre::-webkit-scrollbar, .scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        pre::-webkit-scrollbar-thumb, .scroll::-webkit-scrollbar-thumb { background: #2A2622; border-radius: 3px; }
        pre::-webkit-scrollbar-track, .scroll::-webkit-scrollbar-track { background: transparent; }

        /* 포커스 인디케이터 */
        input:focus, button:focus-visible { outline: 1px solid var(--candle); outline-offset: 2px; }

        /* 책 카드 hover/탭 트랜지션용 */
        .card { transition: transform .18s ease, border-color .18s ease, background .18s ease; }
        .card:hover { transform: translateY(-1px); }

        /* 서울북인스티튜트 스타일 — 얇은 편집 디바이더 */
        .rule { height: 1px; background: linear-gradient(90deg, transparent, var(--line), transparent); }

        #fallback-msg {
            padding: 64px 24px; text-align: center; color: var(--paper-dim); font-size: 13px;
            font-family: var(--font-serif); letter-spacing: .02em;
        }
        #fallback-msg em { color: var(--candle); font-style: normal; }
    </style>
</head>

                  parts.push(`[독자 리뷰]\n${reviews}`);
                }
                detailedText = parts.join('\n\n');
              } else {
                detailedText = `[기본 요약]\n${stripHtml(item.description || "")}`;
              }
              setDescription(detailedText || "제공된 상세 도서 정보가 없습니다.");
            } catch (error) {
              console.error("서지 학습 에러:", error);
              setDescription("서지정보를 불러오지 못했습니다. Gemini의 내장 검색 기능으로 보완하도록 지시됩니다.");
            }

            setIsLoadingDetail(false);
            setStep(2);
          };

          // 책을 다시 고르고 싶을 때 — 1단계 초기화
          const resetBook = () => {
            setBook(""); setAuthor(""); setPublisher(""); setPubYear("");
            setCover(""); setDescription("");
            setStep(1);
          };

          const togglePersona = (id) =>
            setSelPersonas((p) => p.includes(id) ? p.filter((x) => x !== id) : [...p, id]);
          const toggleSpec = (pid, sid) =>
            setSpecSel((prev) => {
              const cur = prev[pid] || [];
              return { ...prev, [pid]: cur.includes(sid) ? cur.filter((x) => x !== sid) : [...cur, sid] };
            });

          const prompt = useMemo(
            () => generatePrompt(book, author, description, level, selPersonas, specSel),
            [book, author, description, level, selPersonas, specSel]
          );
          const ready = book.trim() && level && selPersonas.length > 0;

          const copy = () => {
            navigator.clipboard.writeText(prompt);
            setCopied(true);
            setTimeout(() => setCopied(false), 2200);
          };

          const TOTAL_STEPS = 3;

          return (
            <div style={{ minHeight: "100vh", background: THEME.ink, color: THEME.paper }}>
              {/* ── 헤더 ─────────────────────── */}
              <header style={{ borderBottom: `1px solid ${THEME.line}`, padding: "20px 28px" }}>
                <div style={{ maxWidth: "680px", margin: "0 auto", display: "flex", alignItems: "baseline", justifyContent: "space-between", gap: "14px", flexWrap: "wrap" }}>
                  <div style={{ display: "flex", alignItems: "baseline", gap: "10px" }}>
                    <span style={{ fontFamily: THEME.serif, fontSize: "18px", fontWeight: 500, color: THEME.paper, letterSpacing: "-0.005em" }}>
                      독서모임 프롬프트
                    </span>
                    <span style={{ fontFamily: THEME.mono, fontSize: "10px", color: THEME.candle, letterSpacing: "0.25em" }}>V2</span>
                  </div>
                  <span style={{ fontFamily: THEME.mono, fontSize: "10px", color: THEME.textFaint, letterSpacing: "0.2em" }}>
                    알라딘 → Gemini
                  </span>
                </div>
              </header>

              <main style={{ maxWidth: "680px", margin: "0 auto", padding: "36px 22px 120px" }}>

                <Sec num={1} total={TOTAL_STEPS} label="BOOK" title="오늘 함께 펼칠 책" lede="제목을 적어 주세요. 정확도 순으로 다섯 권을 꺼내 올립니다.">
                  {step === 1 && (
                    <>
                      <div style={{ display: "flex", gap: "8px", alignItems: "stretch" }}>
                        <input
                          placeholder="책 제목 · 예) 데미안, 총·균·쇠"
                          value={query}
                          onChange={(e) => setQuery(e.target.value)}
                          onKeyDown={(e) => e.key === 'Enter' && !isSearching && searchBooks()}
                          style={iStyle({ flex: 1 })}
                        />
                        <button
                          onClick={searchBooks}
                          disabled={!query.trim() || isSearching}
                          style={btnPrimary(isSearching || !query.trim())}
                        >
                          {isSearching ? "찾는 중…" : "검색"}
                        </button>
                      </div>
                      {searchError && (
                        <div style={{ marginTop: "12px", padding: "10px 12px", fontFamily: THEME.serif, fontStyle: "italic", fontSize: "13px", color: THEME.rouge, borderLeft: `2px solid ${THEME.rouge}`, background: "rgba(198,93,93,0.05)" }}>
                          {searchError}
                        </div>
                      )}

                      {searchResults.length > 0 && (
                        <div style={{ marginTop: "22px" }}>
                          <EditorialLabel left="결과 · 정확도순" right={`${searchResults.length} / 5`} />
                          <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
                            {searchResults.map((it, i) => (
                              <BookResultCard
                                key={it.itemId || i}
                                idx={i + 1}
                                item={it}
                                onClick={() => selectBook(it)}
                                disabled={isLoadingDetail}
                              />
                            ))}
                          </div>
                          {isLoadingDetail && (
                            <div style={{ marginTop: "14px", textAlign: "center", fontFamily: THEME.serif, fontStyle: "italic", fontSize: "13px", color: THEME.candle }}>
                              — 선택하신 책의 서지정보를 펼치는 중 —
                            </div>
                          )}
                        </div>
                      )}
                    </>
                  )}

                  {step >= 2 && (
                    <BookPickedCard
                      title={book}
                      author={author}
                      publisher={publisher}
                      pubYear={pubYear}
                      cover={cover}
                      description={description}
                      onReset={resetBook}
                    />
                  )}
                </Sec>

                {step >= 2 && (
                  <Sec num={2} total={TOTAL_STEPS} label="READER" title="오늘 독자의 자리" lede="이 책 앞에 앉은 독자의 호흡을 골라 주세요.">
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "10px" }}>
                      {LEVELS.map((lv) => {
                        const on = level === lv.id;
                        return (
                          <button key={lv.id} onClick={() => setLevel(lv.id)} className="card" style={{
                            padding: "18px 14px 16px", cursor: "pointer", textAlign: "left",
                            background: on ? THEME.paper : "transparent",
                            color: on ? THEME.ink : THEME.paperDim,
                            border: `1px solid ${on ? THEME.paper : THEME.line}`,
                            borderRadius: THEME.radius,
                          }}>
                            <div style={{ fontFamily: THEME.mono, fontSize: "9px", letterSpacing: "0.2em", color: on ? THEME.candleInk : THEME.textFaint, marginBottom: "8px" }}>
                              LEVEL · 0{LEVELS.indexOf(lv) + 1}
                            </div>
                            <div style={{ fontFamily: THEME.serif, fontWeight: 700, fontSize: "17px", marginBottom: "4px", color: on ? THEME.ink : THEME.paper }}>
                              {lv.label}
                            </div>
                            <div style={{ fontSize: "11px", lineHeight: 1.5 }}>{lv.desc}</div>
                          </button>
                        );
                      })}
                    </div>
                    {step === 2 && <Next onClick={() => setStep(3)} />}
                  </Sec>
                )}

                {step >= 3 && (
                  <Sec num={3} total={TOTAL_STEPS} label="COMPANIONS" title="오늘의 동행자"
                       lede="두 명 이상 초대하면 자동으로 라운드테이블이 열립니다. 서로의 말을 한 줄 받아쓴 뒤 자기 의견을 잇는 브릿지 규칙이 걸립니다.">
                    <EditorialLabel left="토론 스타일의 벗" right="STYLE" />
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "9px", marginBottom: "26px" }}>
                      {BASE_PERSONAS.map((p) => <PCard key={p.id} p={p} on={selPersonas.includes(p.id)} toggle={togglePersona} />)}
                    </div>

                    <EditorialLabel left="전공의 렌즈를 든 벗" right="LENS" />
                    <div style={{ display: "flex", flexDirection: "column", gap: "9px" }}>
                      {ACADEMIC_PERSONAS.map((p) => {
                        const on = selPersonas.includes(p.id);
                        return (
                          <div key={p.id}>
                            <PCard p={p} on={on} toggle={togglePersona} wide />
                            {on && (
                              <div style={{ marginTop: "8px", padding: "14px 16px", background: THEME.inkSoft, border: `1px solid ${p.border}`, borderRadius: THEME.radius }}>
                                <div style={{ fontFamily: THEME.mono, fontSize: "10px", color: THEME.textDim, marginBottom: "10px", letterSpacing: "0.08em" }}>
                                  {p.specLabel} <span style={{ color: THEME.textFaint }}>· 선택 안 해도 됨, 복수 선택 가능</span>
                                </div>
                                <div style={{ display: "flex", flexWrap: "wrap", gap: "6px" }}>
                                  {p.specs.map((s) => {
                                    const son = (specSel[p.id] || []).includes(s.id);
                                    return (
                                      <button key={s.id} onClick={() => toggleSpec(p.id, s.id)} className="card" style={{
                                        padding: "7px 11px", cursor: "pointer", textAlign: "left",
                                        background: son ? p.bg : "transparent",
                                        border: `1px solid ${son ? p.border : THEME.line}`,
                                        borderRadius: THEME.radius,
                                      }}>
                                        <div style={{ fontFamily: THEME.serif, fontSize: "13px", fontWeight: son ? 700 : 500, color: son ? p.color : THEME.paperDim }}>{s.label}</div>
                                        <div style={{ fontSize: "10px", color: son ? p.color : THEME.textFaint, marginTop: "2px", maxWidth: "180px", lineHeight: 1.5, opacity: 0.85 }}>{s.desc}</div>
                                      </button>
                                    );
                                  })}
                                </div>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>

                    {selPersonas.length > 0 && (
                      <div style={{ marginTop: "18px", padding: "12px 14px", background: THEME.inkSoft, border: `1px solid ${THEME.line}`, borderRadius: THEME.radius, fontSize: "12px" }}>
                        <span style={{ color: THEME.textDim, marginRight: "10px", fontFamily: THEME.mono, fontSize: "10px", letterSpacing: "0.15em" }}>TABLE</span>
                        {selPersonas.map((id) => {
                          const p = ALL_PERSONAS.find((x) => x.id === id);
                          const specs = specSel[id];
                          return (
                            <span key={id} style={{ marginRight: "12px", fontFamily: THEME.serif }}>
                              <span style={{ color: p.color }}>{p.emoji} {p.name}</span>
                              {specs?.length > 0 && (
                                <span style={{ color: THEME.textFaint, fontSize: "10px", fontFamily: THEME.mono }}>
                                  {" "}· {specs.map((sid) => p.specs?.find((s) => s.id === sid)?.label).filter(Boolean).join(", ")}
                                </span>
                              )}
                            </span>
                          );
                        })}
                        {selPersonas.length >= 2 && (
                          <span style={{ color: THEME.candle, fontSize: "11px", fontFamily: THEME.mono, display: "block", marginTop: "6px", letterSpacing: "0.05em" }}>
                            → 라운드테이블 {selPersonas.length}인 · 브릿지 규칙 자동 적용
                          </span>
                        )}
                      </div>
                    )}
                  </Sec>
                )}

                {step >= 3 && (
                  <aside style={{
                    margin: "6px 0 28px", padding: "16px 18px",
                    background: "rgba(212,163,115,0.04)", border: `1px solid rgba(212,163,115,0.14)`,
                    borderRadius: THEME.radius,
                  }}>
                    <div style={{ fontFamily: THEME.mono, fontSize: "10px", letterSpacing: "0.25em", color: THEME.candle, marginBottom: "8px" }}>COLOPHON · V2</div>
                    <div style={{ fontFamily: THEME.serif, fontSize: "13px", color: THEME.paperDim, lineHeight: 1.85 }}>
                      <b style={{ color: THEME.paper, fontWeight: 500 }}>도서 상세 학습</b> · 도서소개·서지·보도자료·리뷰를 프롬프트에 얹습니다.<br />
                      <b style={{ color: THEME.paper, fontWeight: 500 }}>독서모임 5단계 플로우</b> · 오프닝(환대) → 첫 인상 → 심층 라운드 → 삶과의 연결 → 마음에 남긴 한 줄.<br />
                      <b style={{ color: THEME.paper, fontWeight: 500 }}>브릿지 규칙</b> · 라운드테이블에서 다음 발언자는 앞 사람의 말을 한 줄 받아쓴 뒤 잇습니다.<br />
                      <b style={{ color: THEME.paper, fontWeight: 500 }}>환각 금지</b> · 존재하지 않는 인용·에피소드 날조를 엄격히 금합니다.
                    </div>
                  </aside>
                )}

                {ready && (
                  <section style={{ background: THEME.ink2, border: `1px solid ${THEME.line}`, borderRadius: THEME.radiusLg, overflow: "hidden" }}>
                    <div style={{
                      padding: "14px 18px", borderBottom: `1px solid ${THEME.lineSoft}`,
                      display: "flex", justifyContent: "space-between", alignItems: "center", gap: "10px", flexWrap: "wrap",
                    }}>
                      <div style={{ display: "flex", alignItems: "baseline", gap: "10px", flexWrap: "wrap" }}>
                        <span style={{ fontFamily: THEME.mono, fontSize: "10px", color: THEME.candle, letterSpacing: "0.25em" }}>PROMPT · GEMINI</span>
                        <span style={{ fontFamily: THEME.serif, fontSize: "13px", color: THEME.paperDim, fontStyle: "italic" }}>오늘의 라운드테이블 · V2</span>
                        {selPersonas.length > 1 && (
                          <span style={{ fontFamily: THEME.mono, fontSize: "10px", color: THEME.candle, padding: "2px 8px", border: `1px solid ${THEME.candleInk}`, borderRadius: "2px", letterSpacing: "0.1em" }}>
                            {selPersonas.length}인
                          </span>
                        )}
                      </div>
                      <button onClick={copy} style={btnPaper(copied)}>
                        {copied ? "✓ 복사됨" : "복사하기"}
                      </button>
                    </div>
                    <pre style={{
                      padding: "22px", fontFamily: THEME.mono, fontSize: "11.5px", lineHeight: 1.9,
                      color: "#B8B3A7", whiteSpace: "pre-wrap", wordBreak: "break-word",
                      margin: 0, maxHeight: "440px", overflowY: "auto", background: THEME.ink,
                    }}>
                      {prompt}
                    </pre>
                    <div style={{ padding: "14px 18px", borderTop: `1px solid ${THEME.lineSoft}`, fontFamily: THEME.serif, fontSize: "12.5px", color: THEME.paperDim, lineHeight: 1.8, fontStyle: "italic" }}>
                      복사 후 <b style={{ color: THEME.candle, fontStyle: "normal" }}>Gemini</b>에 붙여 보세요. 첫 답변에서 <b style={{ color: THEME.paper, fontStyle: "normal" }}>[Blueprint 0: 오프닝]</b>으로 자리가 열리는지, 마지막이 <b style={{ color: THEME.paper, fontStyle: "normal" }}>[Blueprint 4: 마음에 남긴 한 줄]</b>로 매듭지어지는지 확인해 보세요.
                    </div>
                  </section>
                )}
              </main>
            </div>
          );
        }

        // ──────────────────────────────────────────────
        //  Sec  —  에디토리얼 섹션 헤더
        //  STEP 번호를 "01 / 03" 페이지네이션으로, 제목은 세리프.
        // ──────────────────────────────────────────────
        function Sec({ num, total, label, title, lede, children }) {
          return (
            <section style={{ marginBottom: "44px" }}>
              <div style={{ display: "flex", alignItems: "baseline", gap: "14px", marginBottom: "6px", flexWrap: "wrap" }}>
                <span style={{ fontFamily: THEME.mono, fontSize: "10px", color: THEME.candle, letterSpacing: "0.25em" }}>
                  STEP · {String(num).padStart(2, "0")} / {String(total).padStart(2, "0")}
                </span>
                {label && (
                  <span style={{ fontFamily: THEME.mono, fontSize: "10px", color: THEME.textFaint, letterSpacing: "0.3em" }}>
                    {label}
                  </span>
                )}
              </div>
              <h2 style={{
                fontFamily: THEME.serif, fontSize: "22px", fontWeight: 500,
                letterSpacing: "-0.01em", margin: "2px 0 6px", color: THEME.paper,
              }}>{title}</h2>
              {lede && (
                <p style={{
                  fontFamily: THEME.serif, fontStyle: "italic", fontSize: "13.5px",
                  color: THEME.paperDim, margin: "0 0 18px", lineHeight: 1.7,
                }}>{lede}</p>
              )}
              <div className="rule" style={{ margin: "0 0 18px" }} />
              {children}
            </section>
          );
        }

        // ──────────────────────────────────────────────
        //  PCard — 페르소나 카드 (에디토리얼 톤 정돈)
        // ──────────────────────────────────────────────
        function PCard({ p, on, toggle, wide }) {
          return (
            <button onClick={() => toggle(p.id)} className="card" style={{
              padding: "16px 16px 14px", cursor: "pointer", textAlign: "left",
              background: on ? p.bg : "transparent",
              border: `1px solid ${on ? p.border : THEME.line}`,
              borderRadius: THEME.radius, position: "relative",
              width: wide ? "100%" : undefined,
              display: wide ? "flex" : "block",
              alignItems: wide ? "center" : undefined,
              gap: wide ? "14px" : undefined,
            }}>
              {on && (
                <div style={{
                  position: "absolute", top: "10px", right: "12px",
                  width: "14px", height: "14px", borderRadius: "50%",
                  background: p.color, display: "flex", alignItems: "center",
                  justifyContent: "center", fontSize: "8px", fontWeight: 900, color: THEME.ink,
                }}>✓</div>
              )}
              <div style={{ fontSize: wide ? "22px" : "20px", marginBottom: wide ? 0 : "10px", flexShrink: 0 }}>{p.emoji}</div>
              <div>
                <div style={{ display: "flex", alignItems: "baseline", gap: "8px", marginBottom: "3px", flexWrap: "wrap" }}>
                  <span style={{ fontFamily: THEME.serif, fontWeight: 700, fontSize: "15px", color: on ? p.color : THEME.paper }}>{p.name}</span>
                  <span style={{ fontFamily: THEME.mono, fontSize: "9px", color: THEME.textDim, letterSpacing: "0.1em" }}>{p.role}</span>
                </div>
                <div style={{ fontFamily: THEME.serif, fontStyle: "italic", fontSize: "12px", color: THEME.paperDim }}>“{p.tagline}”</div>
              </div>
            </button>
          );
        }

        // ──────────────────────────────────────────────
        //  Next — 다음 단계로
        // ──────────────────────────────────────────────
        function Next({ onClick }) {
          return (
            <button onClick={onClick} style={{
              marginTop: "18px", padding: "10px 22px", background: "transparent",
              border: `1px solid ${THEME.candleInk}`, borderRadius: THEME.radius, color: THEME.candle,
              cursor: "pointer", fontFamily: THEME.mono, fontSize: "11px", letterSpacing: "0.2em",
            }}>NEXT&nbsp;STEP&nbsp;→</button>
          );
        }

        // ──────────────────────────────────────────────
        //  EditorialLabel — 얇은 섹션 레이블 (좌·우 정렬 한 줄)
        // ──────────────────────────────────────────────
        function EditorialLabel({ left, right }) {
          return (
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", margin: "0 0 12px", paddingBottom: "8px", borderBottom: `1px solid ${THEME.lineSoft}` }}>
              <span style={{ fontFamily: THEME.serif, fontSize: "12px", color: THEME.paperDim, fontStyle: "italic" }}>{left}</span>
              {right && <span style={{ fontFamily: THEME.mono, fontSize: "9.5px", color: THEME.textFaint, letterSpacing: "0.25em" }}>{right}</span>}
            </div>
          );
        }

        // ──────────────────────────────────────────────
        //  BookResultCard — 검색 결과 한 권 (표지 + 메타)
        // ──────────────────────────────────────────────
        function BookResultCard({ idx, item, onClick, disabled }) {
          const cleanAuthor = (item.author || "").split(',')[0].replace('(지은이)', '').trim();
          const year = (item.pubDate || "").slice(0, 4);
          return (
            <button onClick={onClick} disabled={disabled} className="card" style={{
              width: "100%", padding: "14px 16px", textAlign: "left",
              background: "transparent", border: `1px solid ${THEME.line}`, borderRadius: THEME.radius,
              cursor: disabled ? "wait" : "pointer", display: "flex", gap: "14px", alignItems: "flex-start",
              opacity: disabled ? 0.6 : 1,
            }}>
              <div style={{ flexShrink: 0, width: "54px", height: "78px", background: THEME.inkSoft, border: `1px solid ${THEME.line}`, overflow: "hidden", display: "flex", alignItems: "center", justifyContent: "center" }}>
                {item.cover
                  ? <img src={item.cover} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                  : <span style={{ fontFamily: THEME.mono, fontSize: "9px", color: THEME.textFaint }}>NO COVER</span>}
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontFamily: THEME.mono, fontSize: "9.5px", color: THEME.candle, letterSpacing: "0.2em", marginBottom: "4px" }}>
                  N° {String(idx).padStart(2, "0")}
                </div>
                <div style={{ fontFamily: THEME.serif, fontSize: "15.5px", fontWeight: 500, color: THEME.paper, lineHeight: 1.35, marginBottom: "6px", overflow: "hidden", textOverflow: "ellipsis", display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical" }}>
                  {item.title}
                </div>
                <div style={{ fontSize: "11.5px", color: THEME.paperDim, marginBottom: "2px" }}>
                  {cleanAuthor || "저자 미상"}
                </div>
                <div style={{ fontFamily: THEME.mono, fontSize: "10px", color: THEME.textDim, letterSpacing: "0.05em" }}>
                  {item.publisher || "—"}{year ? ` · ${year}` : ""}
                </div>
              </div>
              <div style={{ alignSelf: "center", fontFamily: THEME.mono, fontSize: "10px", color: THEME.textFaint, letterSpacing: "0.2em", flexShrink: 0 }}>
                PICK →
              </div>
            </button>
          );
        }

        // ──────────────────────────────────────────────
        //  BookPickedCard — 선택된 책, 서지정보 요약
        // ──────────────────────────────────────────────
        function BookPickedCard({ title, author, publisher, pubYear, cover, description, onReset }) {
          const loading = !description;
          return (
            <div style={{ padding: "20px", background: THEME.ink2, border: `1px solid ${THEME.line}`, borderRadius: THEME.radius }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: "14px", gap: "10px", flexWrap: "wrap" }}>
                <span style={{ fontFamily: THEME.mono, fontSize: "10px", color: THEME.candle, letterSpacing: "0.25em" }}>오늘의 책</span>
                <button onClick={onReset} style={{
                  background: "transparent", border: `1px solid ${THEME.line}`, color: THEME.paperDim,
                  padding: "4px 10px", borderRadius: "2px", fontFamily: THEME.mono, fontSize: "10px",
                  letterSpacing: "0.15em", cursor: "pointer",
                }}>← 다시 검색</button>
              </div>
              <div style={{ display: "flex", gap: "18px", alignItems: "flex-start", marginBottom: "16px", flexWrap: "wrap" }}>
                <div style={{ flexShrink: 0, width: "78px", height: "112px", background: THEME.inkSoft, border: `1px solid ${THEME.line}`, overflow: "hidden", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  {cover
                    ? <img src={cover} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                    : <span style={{ fontFamily: THEME.mono, fontSize: "9px", color: THEME.textFaint }}>NO COVER</span>}
                </div>
                <div style={{ flex: 1, minWidth: "200px" }}>
                  <div style={{ fontFamily: THEME.serif, fontSize: "19px", fontWeight: 500, lineHeight: 1.3, marginBottom: "6px", color: THEME.paper }}>
                    《{title || "—"}》
                  </div>
                  <div style={{ fontFamily: THEME.serif, fontStyle: "italic", fontSize: "13px", color: THEME.paperDim, marginBottom: "4px" }}>
                    {author || "저자 미상"}
                  </div>
                  <div style={{ fontFamily: THEME.mono, fontSize: "10px", color: THEME.textDim, letterSpacing: "0.05em" }}>
                    {publisher || "—"}{pubYear ? ` · ${pubYear}` : ""}
                  </div>
                </div>
              </div>

              <EditorialLabel left="서지정보 요약" right={loading ? "LOADING…" : "LOADED"} />
              <div className="scroll" style={{
                fontFamily: THEME.serif, fontSize: "12.5px", color: THEME.paperDim,
                lineHeight: 1.8, maxHeight: "150px", overflowY: "auto", whiteSpace: "pre-wrap",
                paddingRight: "6px",
              }}>
                {loading
                  ? <span style={{ fontStyle: "italic", color: THEME.candle }}>— 책을 조용히 펼치는 중 —</span>
                  : description}
              </div>
            </div>
          );
        }

        // ──────────────────────────────────────────────
        //  입력창 · 버튼 스타일 헬퍼
        // ──────────────────────────────────────────────
        function iStyle(extra = {}) {
          return {
            background: "transparent",
            border: `1px solid ${THEME.line}`,
            borderBottom: `1px solid ${THEME.candleInk}`,
            borderRadius: THEME.radius, padding: "14px 16px",
            fontFamily: THEME.serif, fontSize: "15px",
            color: THEME.paper, outline: "none", boxSizing: "border-box",
            transition: "border-color 0.2s",
            ...extra,
          };
        }
        function btnPrimary(disabled) {
          return {
            padding: "0 22px", background: disabled ? "transparent" : THEME.paper,
            color: disabled ? THEME.textFaint : THEME.ink,
            border: `1px solid ${disabled ? THEME.line : THEME.paper}`,
            borderRadius: THEME.radius, cursor: disabled ? "not-allowed" : "pointer",
            fontFamily: THEME.mono, fontSize: "11px", letterSpacing: "0.2em",
            transition: "all 0.18s",
          };
        }
        function btnPaper(active) {
          return {
            padding: "8px 18px",
            background: active ? THEME.candle : THEME.paper,
            color: THEME.ink, border: "none", borderRadius: THEME.radius,
            cursor: "pointer", fontFamily: THEME.mono, fontSize: "11px",
            letterSpacing: "0.15em", fontWeight: 500,
            transition: "all 0.2s",
          };
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
