                // 알라딘 API 오류 방어 (끝에 붙는 세미콜론 제거)
                if (dataStr.trim().endsWith(';')) {
                    dataStr = dataStr.trim().slice(0, -1);

                console.warn(`호출 실패 (${proxy}):`, error);

            return null; // 모든 시도 실패 시
