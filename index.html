<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Debate Canvas Edition</title>
    <!-- React 및 Babel 로드 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #0A0A0B; 
            color: #D4D4D8;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        * { box-sizing: border-box; }
        
        .canvas-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px 100px;
        }

        .system-header {
            border-bottom: 2px solid #27272A;
            padding-bottom: 20px;
            margin-bottom: 30px;
            font-family: monospace;
        }

        .system-title {
            font-size: 20px;
            font-weight: 700;
            color: #F4F4F5;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .system-meta {
            font-size: 11px;
            color: #71717A;
            letter-spacing: 0.5px;
        }

        .blueprint-section {
            background: #121214;
            border: 1px solid #27272A;
            padding: 24px;
            margin-bottom: 24px;
            position: relative;
        }

        .blueprint-label {
            position: absolute;
            top: -10px;
            left: 20px;
            background: #0A0A0B;
            padding: 0 8px;
            font-family: monospace;
            font-size: 11px;
            color: #A1A1AA;
            border: 1px solid #27272A;
        }

        .input-terminal {
            width: 100%;
            background: #000;
            border: 1px solid #3F3F46;
            color: #10B981;
            font-family: monospace;
            font-size: 14px;
            padding: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-terminal:focus {
            border-color: #10B981;
        }

        .input-terminal::placeholder {
            color: #3F3F46;
        }

        .btn-action {
            background: #18181B;
            border: 1px solid #3F3F46;
            color: #E4E4E7;
            padding: 12px 24px;
            font-family: monospace;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .btn-action:hover:not(:disabled) {
            background: #27272A;
            border-color: #10B981;
            color: #10B981;
        }

        .btn-action:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .grid-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .card-persona {
            background: #09090B;
            border: 1px solid #27272A;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        .card-persona.active {
            border-color: #10B981;
            background: rgba(16, 185, 129, 0.05);
        }

        .card-persona-wide {
            grid-column: 1 / -1;
        }

        .persona-icon {
            font-size: 24px;
            line-height: 1;
        }

        .persona-info {
            flex: 1;
        }

        .persona-name {
            font-weight: 700;
            font-size: 14px;
            color: #F4F4F5;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .persona-role {
            font-family: monospace;
            font-size: 10px;
            color: #71717A;
            text-transform: uppercase;
        }

        .persona-desc {
            font-size: 12px;
            color: #A1A1AA;
            line-height: 1.5;
        }

        .sub-spec-container {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed #27272A;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .spec-tag {
            font-size: 11px;
            font-family: monospace;
            padding: 4px 8px;
            border: 1px solid #3F3F46;
            color: #A1A1AA;
            cursor: pointer;
            background: #000;
        }

        .spec-tag.active {
            border-color: #3B82F6;
            color: #3B82F6;
            background: rgba(59, 130, 246, 0.1);
        }

        .prompt-preview {
            background: #000;
            border: 1px solid #27272A;
            padding: 24px;
            font-family: monospace;
            font-size: 12px;
            line-height: 1.6;
            color: #A1A1AA;
            white-space: pre-wrap;
            overflow-y: auto;
            max-height: 500px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const LEVELS = [
          { id: "beginner", label: "입문", desc: "가볍게 읽은 독자", tone: "쉬운 어휘, 직관적 해설" },
          { id: "general", label: "일반", desc: "꼼꼼히 읽은 독자", tone: "논리적 어휘, 텍스트 분석" },
          { id: "deep", label: "심화", desc: "비판적으로 정독한 독자", tone: "학술적 어휘, 메타인지적 관점" },
        ];

        const BASE_PERSONAS = [
          {
            id: "critic", emoji: "⚔️", name: "지우", role: "Critical Analyst",
            tagline: "논리와 근거 기반의 해체 분석",
            color: "#EF4444",
            instruction: `[ROLE] 당신은 '지우'입니다. 냉철한 논리로 텍스트와 독자의 해석을 날카롭게 해체하는 비평가입니다.\n[OUTPUT DNA]\n- 책의 논리적 허점, 작가의 편향, 독자 해석의 약점을 정확히 짚어냅니다.\n- 반박 시 근거를 들어 먼저 입장을 밝히고, 날카로운 질문을 던집니다.\n- [TONE] 건조하고 직설적인 반말. (예: "그 해석은 근거가 약해", "작가가 이 부분을 놓쳤는데?")`,
          },
          {
            id: "empath", emoji: "🌿", name: "하은", role: "Empathetic Observer",
            tagline: "인물의 감정선과 내면 탐색",
            color: "#10B981",
            instruction: `[ROLE] 당신은 '하은'입니다. 책 속 인물의 감정과 독자의 경험을 함께 탐색하는 동반자입니다.\n[OUTPUT DNA]\n- 인물의 감정선을 섬세하게 짚고, 거기서 느낀 자신의 감상을 먼저 공유합니다.\n- 독자의 감정적 반응을 인정하고 더 깊이 파고들도록 유도합니다.\n- [TONE] 따뜻하고 부드러운 반말. (예: "나는 이 장면에서 이런 감정이 느껴졌어. 너는 어땠어?")`,
          },
          {
            id: "socrates", emoji: "🦉", name: "시온", role: "Socratic Inquirer",
            tagline: "근본적 전제에 대한 끊임없는 질문",
            color: "#F59E0B",
            instruction: `[ROLE] 당신은 '시온'입니다. 책과 독자의 해석에서 전제를 캐물어 스스로 생각하게 만드는 대화자입니다.\n[OUTPUT DNA]\n- 질문 전 짧게 자신의 시각을 먼저 제시합니다.\n- 질문은 한 번에 하나만 던지며, 연속 질문을 금지합니다.\n- [TONE] 조용하지만 집요한 반말. (예: "작가가 이것을 전제하고 있는 것 같은데, 혹시 이 전제에 동의해?")`,
          },
          {
            id: "devil", emoji: "🔥", name: "재인", role: "Devil's Advocate",
            tagline: "기존 해석을 뒤집는 도발적 반론",
            color: "#F97316",
            instruction: `[ROLE] 당신은 '재인'입니다. 책과 독자의 해석에 정반대 시각을 들이미는 악마의 변호인입니다.\n[OUTPUT DNA]\n- 독자나 책이 당연하게 여기는 것에 즉시 반론을 펼칩니다.\n- 입장을 먼저 확실하게 밝히며 도발적이되 그럴듯한 논리를 구사합니다.\n- [TONE] 짧고 도발적인 반말. (예: "나는 완전히 다르게 읽었어. 그건 오히려 이런 의미 아닐까?")`,
          },
        ];

        const ACADEMIC_SPECS = {
          humanities: [
            { id: "existentialism", label: "실존주의", desc: "사르트르·하이데거 (자유, 불안)" },
            { id: "postmodernism", label: "포스트모더니즘", desc: "푸코·데리다 (권력, 해체)" },
            { id: "phenomenology", label: "현상학", desc: "후설·메를로-퐁티 (의식, 경험)" }
          ],
          sociology: [
            { id: "conflict", label: "갈등이론", desc: "마르크스·베버 (권력, 자원)" },
            { id: "structuralism", label: "구조주의", desc: "레비-스트로스 (심층 구조)" },
            { id: "media", label: "미디어이론", desc: "보드리야르 (시뮬라크르)" }
          ]
        };

        const ACADEMIC_PERSONAS = [
          {
            id: "humanities", emoji: "📖", name: "소율", role: "Humanities Scholar",
            tagline: "철학적 사유와 텍스트 이면의 해석",
            color: "#3B82F6",
            specs: ACADEMIC_SPECS.humanities,
            instruction: `[ROLE] 당신은 '소율'입니다. 선택된 철학 사상으로 책을 깊이 분석하는 인문학도입니다.\n[OUTPUT DNA]\n- 책의 주제와 구조를 철학적 시각으로 적극 해석합니다.\n- 철학 개념을 쓸 때는 반드시 한 문장으로 쉽게 풀어 설명합니다.\n- [TONE] 사유하는 듯 천천히, 지적인 반말.`,
          },
          {
            id: "sociology", emoji: "🏛️", name: "다인", role: "Sociological Analyst",
            tagline: "개인의 서사를 넘어선 구조적 통찰",
            color: "#8B5CF6",
            specs: ACADEMIC_SPECS.sociology,
            instruction: `[ROLE] 당신은 '다인'입니다. 선택된 사회학 이론으로 책 속 권력과 구조를 분석하는 사회학도입니다.\n[OUTPUT DNA]\n- 책의 사건을 개인의 문제가 아닌 사회 구조의 산물로 해석합니다.\n- 이론 이름을 쓸 때는 직관적인 한 줄 설명을 덧붙입니다.\n- [TONE] 날카롭지만 차분한 반말.`,
          }
        ];

        const ALL_PERSONAS = [...BASE_PERSONAS, ...ACADEMIC_PERSONAS];

        function generatePrompt(book, author, description, level, selPersonas, specSel) {
          const lv = LEVELS.find((l) => l.id === level);
          const sel = ALL_PERSONAS.filter((p) => selPersonas.includes(p.id));
          if (!lv || sel.length === 0) return "";

          const pBlocks = sel.map((p) => {
            const acad = ACADEMIC_PERSONAS.find((a) => a.id === p.id);
            let specBlock = "";
            if (acad) {
              const chosen = specSel[p.id] || [];
              if (chosen.length > 0) {
                const names = chosen.map((sid) => p.specs.find((x) => x.id === sid)?.label).filter(Boolean);
                specBlock = `\n[LENS] ${names.join(", ")}`;
              }
            }
            return `[P-1] ${p.name} (${p.role})${specBlock}\n${p.instruction}`;
          }).join("\n\n");

          const panelBlock = sel.length > 1 
            ? `[M-PANEL] BOOK CLUB DISCUSSION ENGINE\n[SHARED PROTOCOL] 각 페르소나는 독립적으로 발언하며, 서로 동의 또는 반박하면서 자연스럽게 다각도 토론을 전개합니다. 한 번에 1∼2명의 페르소나만 발언한 후 독자에게 턴을 넘깁니다.` 
            : "";

          return `[A] SYSTEM CORE
[A-1] Grand Premise & Execution Order
[LAW 0: KNOWLEDGE ANCHOR] 하단 [M-CODEX] 에 제공된 도서 정보 (리뷰, 목차, 보도자료 등) 를 최우선으로 분석 기반으로 삼으며, 정보가 부족할 경우 자체 웹 검색을 통해 즉시 지식을 보완합니다.
[LAW 1: TEXT ONLY] 모든 토론은 텍스트 기반으로 진행됩니다.
[LAW 2: NO EVASION] "제가 잘 모르는 책입니다" 등의 회피성 발언은 엄격히 금지됩니다. 검색 기능을 활용하여 반드시 분석을 도출하세요.
[LAW 3: DEPTH MANDATE] 독자의 감상에 단순 동의하는 것을 넘어, 책의 구체적 장면과 논점을 적극 인용하여 토론의 심도를 높이세요.

[P] PERSONA CORE DNA INJECTION
${pBlocks}

${panelBlock}

[M-CODEX] KNOWLEDGE ENGINE
[M-1] 도서 상세 지식 (Aladin API Extracted Data)
> 🔑 도서명: ${book}
> 🔑 저자: ${author ? author : "검색 요망"}
***
${description ? description : "웹 검색을 통해 이 책의 상세 줄거리와 논점을 파악하세요."}
***

[M-INIT] INITIATION PROTOCOL
[독자 수준: ${lv.label} / 톤: ${lv.tone}]
지금부터 《${book}》 독서토론을 시작합니다.
먼저 "사전 지식 로딩을 완료했습니다" 라는 뉘앙스의 짧은 첫인상과 함께, 독자의 첫 마디나 감상을 이끌어내는 예리한 질문으로 토론을 열어주세요.`;
        }

        const stripHtml = (html) => {
            if (!html) return "";
            return html.replace(/<[^>]*>?/gm, '').replace(/&[a-zA-Z]+;/g, ' ').trim();
        };

        function App() {
          const [book, setBook] = useState("");
          const [author, setAuthor] = useState("");
          const [description, setDescription] = useState("");
          const [level, setLevel] = useState("general");
          const [selPersonas, setSelPersonas] = useState([]);
          const [specSel, setSpecSel] = useState({});
          const [copied, setCopied] = useState(false);
          const [step, setStep] = useState(1);
          const [isLoading, setIsLoading] = useState(false);
          const [logMsg, setLogMsg] = useState("");

          // 사용자님의 Aladin API Key 직접 사용
          const ALADIN_KEY = "ttbtwinwhee0938002";

          const searchBookDirectly = async () => {
            if (!book.trim()) return;
            setIsLoading(true);
            setLogMsg("[SYSTEM] Initiating Direct Aladin API Call...");
            
            try {
              // 1. 상품 검색 (ItemSearch) - 직접 호출
              const searchUrl = `https://www.aladin.co.kr/ttb/api/ItemSearch.aspx?ttbkey=${ALADIN_KEY}&Query=${encodeURIComponent(book)}&QueryType=Title&MaxResults=1&start=1&SearchTarget=Book&output=js&Version=20131101`;
              
              setLogMsg("[SYSTEM] Fetching ItemId...");
              const searchRes = await fetch(searchUrl);
              let searchText = await searchRes.text();
              if (searchText.trim().endsWith(';')) searchText = searchText.trim().slice(0, -1);
              const searchData = JSON.parse(searchText);

              if (searchData && searchData.item && searchData.item.length > 0) {
                const item = searchData.item[0];
                setBook(item.title);
                const cleanAuthor = item.author.split(',')[0].replace('(지은이)', '').trim();
                setAuthor(cleanAuthor);

                // 2. 상품 상세 조회 (ItemLookUp) - OptResult 포함 직접 호출
                setLogMsg(`[SYSTEM] ItemId [${item.itemId}] Found. Fetching Deep Knowledge (Reviews, TOC, Intro)...`);
                const lookupUrl = `https://www.aladin.co.kr/ttb/api/ItemLookUp.aspx?ttbkey=${ALADIN_KEY}&itemIdType=ItemId&ItemId=${item.itemId}&output=js&Version=20131101&OptResult=reviewList,fulldescription,fulldescription2,Toc,Story`;
                
                const lookupRes = await fetch(lookupUrl);
                let lookupText = await lookupRes.text();
                if (lookupText.trim().endsWith(';')) lookupText = lookupText.trim().slice(0, -1);
                const lookupData = JSON.parse(lookupText);

                let detailedText = "";

                if (lookupData && lookupData.item && lookupData.item.length > 0) {
                  const detailItem = lookupData.item[0];
                  const infoParts = [];

                  if (detailItem.description) infoParts.push(`[기본 요약]\n${stripHtml(detailItem.description)}`);
                  if (detailItem.fullDescription) infoParts.push(`[도서소개 자료]\n${stripHtml(detailItem.fullDescription)}`);
                  if (detailItem.fullDescription2) infoParts.push(`[보도자료/출판사 리뷰]\n${stripHtml(detailItem.fullDescription2)}`);
                  if (detailItem.subInfo?.Story) infoParts.push(`[상세 줄거리]\n${stripHtml(detailItem.subInfo.Story)}`);
                  if (detailItem.subInfo?.Toc) infoParts.push(`[서지자료 - 목차]\n${stripHtml(detailItem.subInfo.Toc)}`);
                  
                  if (detailItem.subInfo?.reviewList && detailItem.subInfo.reviewList.length > 0) {
                      const reviews = detailItem.subInfo.reviewList.map(r => `- ${stripHtml(r.title)} (작성자: ${r.writer})`).join('\n');
                      infoParts.push(`[독자 리뷰]\n${reviews}`);
                  }

                  detailedText = infoParts.join('\n\n');
                  setLogMsg("[SYSTEM] Codex Data Extraction Complete.");
                } else {
                  detailedText = `[기본 요약]\n${stripHtml(item.description)}`;
                  setLogMsg("[SYSTEM] Deep Knowledge Not Found. Falling back to basic description.");
                }

                setDescription(detailedText);
              } else {
                setLogMsg("[ERROR] No items found matching the query.");
                setDescription("알라딘 데이터베이스에서 책을 찾을 수 없습니다. (Gemini의 웹 검색에 의존하도록 설정됨)");
              }
            } catch (error) {
              console.error(error);
              setLogMsg("[ERROR] CORS Policy Blocked Direct API Call. Bypassing...");
              // 프록시 없이 직접 호출만 수행하므로 브라우저 환경(CORS)에서 실패 시 안내 문구 출력
              setDescription(`[API 호출 오류]\n직접 호출(CORS)이 브라우저 보안 정책에 의해 차단되었습니다.\n프롬프트 생성 시 Gemini가 직접 책을 웹 검색하여 학습하도록 유도합니다.`);
            }

            setIsLoading(false);
            setStep(2);
          };

          const togglePersona = (id) =>
            setSelPersonas((p) => p.includes(id) ? p.filter((x) => x !== id) : [...p, id]);
          
          const toggleSpec = (pid, sid, e) => {
            e.stopPropagation();
            setSpecSel((prev) => {
              const cur = prev[pid] || [];
              return { ...prev, [pid]: cur.includes(sid) ? cur.filter((x) => x !== sid) : [...cur, sid] };
            });
          };

          const prompt = generatePrompt(book, author, description, level, selPersonas, specSel);
          const ready = book.trim() && level && selPersonas.length > 0;

          const copyToClipboard = () => {
            navigator.clipboard.writeText(prompt);
            setCopied(true);
            setTimeout(() => setCopied(false), 2000);
          };

          return (
            <div className="canvas-container">
              <div className="system-header">
                <div className="system-title">A&B CANVAS : BOOK CLUB EDITION</div>
                <div className="system-meta">Contact: lemoaxtoria@gmail.com | Powered by Aladin API (Direct Fetch)</div>
              </div>

              {/* [SECTOR 1] KNOWLEDGE RETRIEVAL */}
              <div className="blueprint-section">
                <div className="blueprint-label">[M-1] KNOWLEDGE RETRIEVAL</div>
                <div style={{ display: "flex", gap: "12px", marginTop: "10px" }}>
                  <input 
                    className="input-terminal"
                    placeholder="> Enter Book Title..." 
                    value={book} 
                    onChange={(e) => setBook(e.target.value)} 
                    onKeyDown={(e) => e.key === 'Enter' && step === 1 && searchBookDirectly()}
                  />
                  {step === 1 && (
                    <button 
                      className="btn-action" 
                      onClick={searchBookDirectly}
                      disabled={!book.trim() || isLoading}
                    >
                      {isLoading ? "Fetching..." : "Execute"}
                    </button>
                  )}
                  {step >= 2 && (
                    <button className="btn-action" onClick={() => setStep(1)}>Reset</button>
                  )}
                </div>
                
                {logMsg && (
                  <div style={{ marginTop: "12px", fontSize: "11px", color: "#A1A1AA", fontFamily: "monospace" }}>
                    {logMsg}
                  </div>
                )}

                {step >= 2 && (
                  <div style={{ marginTop: "20px", borderTop: "1px dashed #3F3F46", paddingTop: "16px" }}>
                    <div style={{ fontSize: "12px", color: "#10B981", marginBottom: "8px", fontFamily: "monospace" }}>[CODEX_DATA_LOADED]</div>
                    <div style={{ fontSize: "16px", color: "#F4F4F5", fontWeight: "bold" }}>{book}</div>
                    <div style={{ fontSize: "12px", color: "#A1A1AA", marginBottom: "12px" }}>AUTHOR: {author || "N/A"}</div>
                    <div style={{ 
                        fontSize: "12px", color: "#D4D4D8", lineHeight: "1.6", 
                        background: "#000", padding: "12px", border: "1px solid #27272A",
                        maxHeight: "120px", overflowY: "auto", whiteSpace: "pre-wrap"
                    }}>
                      {description}
                    </div>
                  </div>
                )}
              </div>

              {/* [SECTOR 2] USER CONTEXT */}
              {step >= 2 && (
                <div className="blueprint-section">
                  <div className="blueprint-label">[M-2] USER CONTEXT</div>
                  <div className="grid-options" style={{ marginTop: "10px" }}>
                    {LEVELS.map((lv) => (
                      <button 
                        key={lv.id} 
                        className={`btn-action ${level === lv.id ? 'active' : ''}`}
                        style={{ 
                          background: level === lv.id ? "rgba(16, 185, 129, 0.1)" : "#09090B",
                          borderColor: level === lv.id ? "#10B981" : "#27272A",
                          color: level === lv.id ? "#10B981" : "#A1A1AA",
                          textAlign: "left", display: "block"
                        }}
                        onClick={() => setLevel(lv.id)}
                      >
                        <div style={{ fontSize: "14px", fontWeight: "bold", marginBottom: "4px" }}>{lv.label}</div>
                        <div style={{ fontSize: "11px", textTransform: "none" }}>{lv.desc}</div>
                      </button>
                    ))}
                  </div>
                  {step === 2 && (
                    <button className="btn-action" style={{ marginTop: "16px", width: "100%" }} onClick={() => setStep(3)}>
                      Proceed to Persona Injection &gt;
                    </button>
                  )}
                </div>
              )}

              {/* [SECTOR 3] PERSONA INJECTION */}
              {step >= 3 && (
                <div className="blueprint-section">
                  <div className="blueprint-label">[M-3] PERSONA INJECTION</div>
                  
                  <div style={{ fontSize: "11px", color: "#71717A", marginBottom: "12px", fontFamily: "monospace" }}>
                    &gt; Select target personas for discussion engine (Multiple selection enables Panel Mode)
                  </div>

                  <div className="grid-options">
                    {ALL_PERSONAS.map((p) => {
                      const isActive = selPersonas.includes(p.id);
                      const isAcademic = p.specs !== undefined;
                      
                      return (
                        <div 
                          key={p.id} 
                          className={`card-persona ${isActive ? 'active' : ''} ${isAcademic ? 'card-persona-wide' : ''}`}
                          onClick={() => togglePersona(p.id)}
                        >
                          <div className="persona-icon">{p.emoji}</div>
                          <div className="persona-info">
                            <div className="persona-name">
                              {p.name}
                              <span className="persona-role">[{p.role}]</span>
                            </div>
                            <div className="persona-desc">{p.tagline}</div>
                            
                            {isAcademic && isActive && (
                              <div className="sub-spec-container">
                                {p.specs.map(s => {
                                  const isSpecActive = (specSel[p.id] || []).includes(s.id);
                                  return (
                                    <div 
                                      key={s.id} 
                                      className={`spec-tag ${isSpecActive ? 'active' : ''}`}
                                      onClick={(e) => toggleSpec(p.id, s.id, e)}
                                    >
                                      {s.label}
                                    </div>
                                  )
                                })}
                              </div>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* [SECTOR 4] OUTPUT GENERATION */}
              {ready && (
                <div className="blueprint-section" style={{ borderColor: "#10B981" }}>
                  <div className="blueprint-label" style={{ color: "#10B981" }}>[SYSTEM] PROMPT COMPILED</div>
                  <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: "12px" }}>
                    <button 
                      className="btn-action" 
                      style={{ background: copied ? "#10B981" : "#18181B", color: copied ? "#000" : "#E4E4E7", borderColor: copied ? "#10B981" : "#3F3F46" }}
                      onClick={copyToClipboard}
                    >
                      {copied ? "[ COPY SUCCESS ]" : "[ EXPORT TO CLIPBOARD ]"}
                    </button>
                  </div>
                  <div className="prompt-preview">
                    {prompt}
                  </div>
                </div>
              )}

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
